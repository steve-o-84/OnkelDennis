<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" name="viewport"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="#d9a66d" name="theme-color"/>
<title>Onkel Dennis · v1.4.23</title>
<style>
:root{
  --ink:#302620;--paper:#fff8ed;--panel:#fffdf8;--brown:#725341;--accent:#d9985d;
  --green:#7fb384;--red:#d36f67;--blue:#72a9c4;--shadow:#5a39252a
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;overscroll-behavior:none}
body{
  font-family:ui-rounded,"SF Pro Rounded",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--ink);
  background:linear-gradient(145deg,#f1d7b7,#e8c4ac 48%,#bfd9cd);
  padding:max(10px,env(safe-area-inset-top)) 10px max(14px,env(safe-area-inset-bottom))
}
button,input,select{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}
.app{width:min(940px,100%);margin:auto}
header{display:flex;justify-content:space-between;align-items:end;margin:4px 4px 12px}
.kicker{font-size:11px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;opacity:.58}
h1{font-size:clamp(34px,8vw,62px);line-height:.9;margin:4px 0 0;letter-spacing:-.055em}
.version{font-size:12px;opacity:.62;font-weight:900}
.panel{
  background:#fffdf3e8;border:1px solid #fff;backdrop-filter:blur(15px);
  border-radius:28px;box-shadow:0 24px 70px var(--shadow);padding:18px
}
.start-card{display:grid;gap:14px}
label{display:block;font-size:12px;font-weight:900;margin:8px 0 5px}
input,select{width:100%;border:2px solid transparent;border-radius:13px;padding:12px;background:#fff;outline:none}
.primary,.secondary{border:0;border-radius:14px;padding:12px 16px;font-weight:950}
.primary{background:#4f3a30;color:white}
.secondary{background:#eee0d1;color:#4f3a30}
.game-shell{
  background:linear-gradient(145deg,#e4aa70,#ca8159);border:5px solid #fff7e9;border-radius:42px;
  padding:18px 16px 22px;box-shadow:0 28px 70px #65472c30,inset 0 -8px 0 #a85e4038
}
.topline{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.brand{font-weight:1000;letter-spacing:.13em;font-size:12px;color:#653a2b}
.top-actions{display:flex;gap:7px}
.smalltop{border:0;border-radius:12px;padding:8px 10px;background:#fff9;font-weight:900}
.roombar{display:flex;gap:7px;margin:8px 0;overflow:auto}
.roombtn{border:0;border-radius:999px;padding:8px 12px;background:#fff8;font-weight:900;white-space:nowrap}
.roombtn.active{background:#4f3a30;color:white}
.screen{
  position:relative;height:min(53vh,470px);min-height:390px;overflow:hidden;border:9px solid #604b40;border-radius:25px;
  box-shadow:inset 0 0 0 4px #8a7564,0 7px 0 #a96547;background:#ddd;isolation:isolate;
  -webkit-mask-image:-webkit-radial-gradient(white,black);transform:translateZ(0)
}
.room-deco{position:absolute;inset:0;z-index:0}
.room-deco svg{width:100%;height:100%;display:block}
.bubble{position:absolute;z-index:8;left:16px;top:15px;max-width:66%;padding:10px 13px;border-radius:16px 16px 16px 4px;background:#fffdf4;box-shadow:0 8px 24px #5c453328;font-size:13px;font-weight:900;transition:.3s}
.bubble.hide{opacity:0;transform:translateY(-6px)}
.stage{position:absolute;left:50%;bottom:10px;width:330px;height:320px;transform:translateX(-50%);z-index:5}
.shadow{position:absolute;left:65px;bottom:4px;width:205px;height:34px;border-radius:50%;background:#50382d35}
#dennis{position:absolute;inset:0;transform-origin:50% 90%}

#dennis.eat{animation:eat 1.9s ease-in-out 1}
#dennis.drink{animation:drink 1.8s ease-in-out 1}
#dennis.exercise{animation:exercise 2.2s ease-in-out 1}
#dennis.sleep{animation:sleep 2.6s ease-in-out 1}
#dennis.shower{animation:shower 2s linear 1}
#dennis.cheer{animation:cheer 1.8s ease-in-out 1}
@keyframes breathe{50%{transform:translateY(4px)}}
@keyframes eat{20%,60%{transform:translateY(8px) rotate(-2deg)}40%,80%{transform:translateY(1px) rotate(2deg)}}
@keyframes drink{25%,65%{transform:rotate(-4deg) translateY(3px)}45%,85%{transform:rotate(1deg)}}
@keyframes exercise{0%,100%{transform:translateY(0)}25%{transform:translateY(-25px) rotate(-4deg)}50%{transform:translateX(28px)}75%{transform:translateY(-18px) rotate(4deg)}}
@keyframes sleep{to{transform:translateY(14px) rotate(-7deg) scaleY(.95)}}
@keyframes shower{25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes cheer{30%{transform:translateY(-24px) rotate(-5deg)}65%{transform:translateY(-8px) rotate(5deg)}}
svg{width:100%;height:100%}
.prop{position:absolute;z-index:9;display:none}
.prop.show{display:block}
#snack{left:122px;bottom:12px;width:85px;height:55px}
#drinkProp{left:135px;bottom:16px;width:54px;height:70px}
.info{display:flex;justify-content:space-between;gap:8px;margin:12px 0}
.pill{background:#fff9;padding:8px 11px;border-radius:999px;font-weight:900;box-shadow:0 6px 15px #704a3420;font-size:13px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat{background:#fff9;border-radius:14px;padding:8px}
.stathead{display:flex;justify-content:space-between;font-size:11px;font-weight:900;gap:4px;margin-bottom:5px}
.track{height:9px;border-radius:99px;background:#ddcfbd;overflow:hidden}
.fill{height:100%;border-radius:inherit;background:linear-gradient(90deg,#e88b75,#79b390);transition:width .35s}
.tabs{display:flex;gap:7px;margin-top:13px;overflow:auto;padding-bottom:2px}
.tab{border:0;border-radius:999px;padding:9px 13px;background:#f3dfca;font-weight:900;white-space:nowrap}
.tab.active{background:#4f3a30;color:#fff}
.action-pane{display:none;margin-top:10px}
.action-pane.active{display:block}
.actions,.foodgrid,.drinkgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.action,.item{border:0;border-radius:16px;background:#fff;padding:12px;box-shadow:0 7px 17px #6b45261d;font-weight:950}
.action{min-height:72px;display:grid;place-items:center;gap:2px}
.action span{font-size:23px}
.item{text-align:left}
.item b{display:block}.item small{opacity:.65}
.vitals{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.vital{background:#fff7e9;border-radius:13px;padding:8px;text-align:center;font-size:12px;font-weight:900}
.toast{position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translate(-50%,30px);opacity:0;background:#2f2723;color:#fff;padding:11px 16px;border-radius:999px;font-weight:900;transition:.25s;z-index:80}
.toast.show{opacity:1;transform:translate(-50%,0)}
.modal{position:fixed;inset:0;z-index:60;background:#281d18aa;display:grid;place-items:center;padding:16px}
.modal-card{width:min(520px,100%);max-height:88vh;overflow:auto;background:#fffaf0;border-radius:25px;padding:20px;box-shadow:0 25px 80px #0005}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
@media(max-width:720px){
  .game-shell{border-radius:30px;padding:15px 10px 19px}
  .screen{height:min(64vw,430px);min-height:340px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .actions,.foodgrid,.drinkgrid{grid-template-columns:repeat(2,1fr)}
  .tabs{position:sticky;bottom:max(8px,env(safe-area-inset-bottom));z-index:30;background:#fff9;padding:7px;border-radius:16px;backdrop-filter:blur(12px)}
}

.shopgrid,.inventorygrid,.outfitgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.shopitem,.inventoryitem,.outfititem{border:0;border-radius:16px;background:#fff;padding:12px;box-shadow:0 7px 17px #6b45261d;font-weight:950;text-align:left}
.shopitem b,.inventoryitem b,.outfititem b{display:block}
.shopitem small,.inventoryitem small,.outfititem small{opacity:.65}
.outfititem.active{outline:3px solid #7fb384}
.badge{display:inline-block;margin-top:6px;padding:3px 7px;border-radius:999px;background:#eee0d1;font-size:10px}
#dennis.run{animation:runScene 2.4s ease-in-out 1}
#dennis.boulder{animation:boulderScene 2.6s ease-in-out 1}
@keyframes runScene{
  0%{transform:translateX(-110px) translateY(0) rotate(-3deg)}
  15%{transform:translateX(-70px) translateY(-12px) rotate(3deg)}
  30%{transform:translateX(-25px) translateY(0) rotate(-3deg)}
  45%{transform:translateX(20px) translateY(-13px) rotate(3deg)}
  60%{transform:translateX(65px) translateY(0) rotate(-3deg)}
  75%{transform:translateX(105px) translateY(-11px) rotate(3deg)}
  100%{transform:translateX(130px) translateY(0) rotate(0)}
}
@keyframes boulderScene{
  0%{transform:translateY(0) rotate(0)}
  20%{transform:translateX(-28px) translateY(-30px) rotate(-5deg)}
  40%{transform:translateX(18px) translateY(-70px) rotate(4deg)}
  60%{transform:translateX(-12px) translateY(-105px) rotate(-4deg)}
  80%{transform:translateX(28px) translateY(-68px) rotate(3deg)}
  100%{transform:translateY(0) rotate(0)}
}
.outfit-layer{pointer-events:none}
.outfit-cap,.outfit-redshirt,.outfit-greenshirt,.outfit-lightjeans,.outfit-blackpolo,.outfit-bluecap{display:none}
#dennis.wearing-cap .outfit-cap{display:block}
#dennis.wearing-redshirt .shirt-base{fill:#c65f55!important}
#dennis.wearing-greenshirt .shirt-base{fill:#6eaa7d!important}
#dennis.wearing-lightjeans .jeans-base{fill:#7698bd!important}
#dennis.wearing-blackpolo .shirt-base{fill:#33373d!important}
#dennis.wearing-bluecap .outfit-cap{display:block}
#dennis.wearing-bluecap .outfit-cap path:first-child{fill:#4f79a8!important}
#dennis.wearing-bluecap .outfit-cap path:last-child{fill:#365d88!important}
@media(max-width:720px){
  .shopgrid,.inventorygrid,.outfitgrid{grid-template-columns:repeat(2,1fr)}
}


.event-box,.wish-box{display:block;width:100%;margin:12px 0 0;padding:12px 14px;border-radius:15px;font-size:12px;font-weight:900;box-shadow:0 6px 15px #704a3420;position:relative;z-index:1;clear:both}
.event-box{background:#fff0b9}.wish-box{background:#dff0ff}
.event-box.hidden,.wish-box.hidden{display:none!important}
.minigamegrid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.gamecard{border:0;border-radius:17px;padding:14px;background:#fff;box-shadow:0 7px 17px #6b45261d;font-weight:950;text-align:left}
.gamecard b{display:block;font-size:15px}.gamecard small{opacity:.65}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}
.memory-card{position:relative;aspect-ratio:1;border:0;background:#5b4338;border-radius:14px;overflow:hidden;padding:0}
.memory-card.revealed,.memory-card.matched{background:#fff7e8}
.memory-card.matched{opacity:.5}
.memory-art{width:100%;height:100%;display:grid;place-items:center;padding:7px}
.memory-art svg{width:85%;height:85%}
.challenge-area{position:relative;height:260px;border-radius:18px;overflow:hidden;background:linear-gradient(#a8d9ec 0 55%,#83bd72 55%)}
.runner{position:absolute;left:18px;bottom:28px;width:48px;height:72px;border-radius:22px;background:#6d93b5;transition:left .18s,bottom .18s}
.obstacle{position:absolute;right:20px;bottom:20px;width:34px;height:48px;border-radius:8px;background:#82573e}
.hold-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}
.hold{aspect-ratio:1;border:0;border-radius:50% 45% 55% 42%;background:#d9b54a;box-shadow:inset 0 -6px 0 #9b7d2e;font-weight:1000}
.hold.correct{outline:4px solid #72b48a}
.catch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}
.catch-item{border:0;border-radius:16px;padding:18px 8px;background:#fff;font-weight:950}
.reward-pop{font-size:22px;font-weight:1000;text-align:center;padding:12px}
.modal-card h2{margin-top:0}
@media(max-width:520px){.minigamegrid{grid-template-columns:1fr}.memory-grid{grid-template-columns:repeat(4,1fr)}}


/* Version 1.4.23 – Feinschliff */
.screen{
  background:#d9c8b7;
  -webkit-mask-image:-webkit-radial-gradient(white,black);
  transform:translateZ(0);
  contain:paint
}
.room-deco{overflow:hidden;border-radius:16px}
.room-deco svg{preserveAspectRatio:xMidYMid slice}
.action:disabled,.item:disabled,.gamecard:disabled,.tab:disabled,.roombtn:disabled,.shopitem:disabled,.inventoryitem:disabled,.outfititem:disabled{
  opacity:.42;cursor:default;filter:saturate(.7)
}




#dennis.reward{animation:rewardScene 1.8s ease-in-out 1}




@keyframes rewardScene{
  0%,100%{transform:translateY(0) scale(1)}
  28%{transform:translateY(-28px) rotate(-6deg) scale(1.04)}
  58%{transform:translateY(-8px) rotate(6deg) scale(1.03)}
}
.achievementgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.achievement{border-radius:16px;padding:12px;background:#fff;box-shadow:0 7px 17px #6b45261d}
.achievement.locked{opacity:.45;filter:grayscale(.6)}
.achievement b{display:block}.achievement small{opacity:.66}
.status-warning{display:none;margin:12px 0 0;padding:10px 12px;border-radius:14px;background:#f4d1ca;color:#762d29;font-size:12px;font-weight:900}
.status-warning.show{display:block}
.room-label{position:absolute;right:14px;top:14px;z-index:8;padding:7px 10px;border-radius:999px;background:#ffffffc9;font-size:11px;font-weight:950;box-shadow:0 5px 14px #60473825}
.screen-night{position:absolute;inset:0;z-index:2;pointer-events:none;background:#17234555;mix-blend-mode:multiply;opacity:0;transition:opacity .6s}
.screen.is-night .screen-night{opacity:1}
.mobile-actions{display:none}
@media(max-width:720px){
  body{padding-bottom:calc(80px + env(safe-area-inset-bottom))}
  .screen{height:min(64vw,430px);min-height:340px}
  .tabs{
    position:sticky;bottom:max(8px,env(safe-area-inset-bottom));z-index:35;
    background:#fff9;padding:7px;border-radius:17px;backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);box-shadow:0 10px 28px #5439272b
  }
  .tab{flex:0 0 auto}
  .achievementgrid{grid-template-columns:repeat(2,1fr)}
  .roombar{scrollbar-width:none}.roombar::-webkit-scrollbar,.tabs::-webkit-scrollbar{display:none}
}
@media(max-width:430px){
  .screen{height:min(78vw,390px);min-height:315px}
  .stage{width:290px;height:285px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .actions,.foodgrid,.drinkgrid,.shopgrid,.inventorygrid,.outfitgrid{grid-template-columns:repeat(2,1fr)}
  .achievementgrid{grid-template-columns:1fr}
  .pill{font-size:11px}
}


/* Version 1.4.23 – Figuren-, Animations- und UI-Feinschliff */
.stage{width:350px;height:340px}
#dennis{transform-origin:50% 92%}
#dennis .body-main{transform-box:fill-box;transform-origin:center;transform:scaleX(.80) scaleY(1.08)}
#dennis .head-main{transform-box:fill-box;transform-origin:center;transform:scale(1.02,.98)}
#dennis .hair-main{filter:drop-shadow(0 2px 0 rgba(60,35,25,.15))}
#dennis .shirt-base{rx:34}
#dennis .arm-left,#dennis .arm-right{transform-box:fill-box;transform-origin:50% 0}






@keyframes runSceneDetailed{
  0%{transform:translateX(-125px) translateY(0) rotate(-4deg)}
  12%{transform:translateX(-95px) translateY(-13px) rotate(4deg)}
  24%{transform:translateX(-65px) translateY(0) rotate(-3deg)}
  36%{transform:translateX(-30px) translateY(-15px) rotate(4deg)}
  48%{transform:translateX(5px) translateY(0) rotate(-3deg)}
  60%{transform:translateX(42px) translateY(-14px) rotate(4deg)}
  72%{transform:translateX(78px) translateY(0) rotate(-3deg)}
  84%{transform:translateX(112px) translateY(-12px) rotate(3deg)}
  100%{transform:translateX(145px) translateY(0)}
}
@keyframes boulderSceneDetailed{
  0%{transform:translate(0,0) rotate(0)}
  18%{transform:translate(-34px,-34px) rotate(-6deg)}
  36%{transform:translate(20px,-72px) rotate(5deg)}
  54%{transform:translate(-18px,-112px) rotate(-5deg)}
  72%{transform:translate(28px,-78px) rotate(4deg)}
  88%{transform:translate(-8px,-34px) rotate(-3deg)}
  100%{transform:translate(0,0) rotate(0)}
}


@keyframes eatDetailed{
  0%,100%{transform:translateY(0) rotate(0)}
  22%{transform:translateY(-2px) rotate(-2deg)}
  45%{transform:translateY(3px) rotate(2deg)}
  68%{transform:translateY(-1px) rotate(-2deg)}
}
@keyframes drinkDetailed{
  0%,100%{transform:rotate(0)}
  22%{transform:rotate(-4deg) translateY(1px)}
  48%{transform:rotate(-7deg) translateY(-1px)}
  72%{transform:rotate(-3deg)}
}
#snack,#drinkProp{
  transition:left .35s ease,bottom .35s ease,transform .35s ease
}
#snack.to-mouth{left:143px;bottom:151px;transform:scale(.82) rotate(-7deg)}
#drinkProp.to-mouth{left:148px;bottom:145px;transform:scale(.82) rotate(-12deg)}




.autosave-note{font-size:11px;opacity:.65;text-align:center;margin-top:8px;font-weight:900}


#dennis.wearing-redshirt .sleeve-left,
#dennis.wearing-redshirt .sleeve-right{fill:#b94f48!important}
#dennis.wearing-greenshirt .sleeve-left,
#dennis.wearing-greenshirt .sleeve-right{fill:#5e996e!important}
#dennis.wearing-blackpolo .sleeve-left,
#dennis.wearing-blackpolo .sleeve-right{fill:#2d3035!important}


.item-icon{font-size:24px;line-height:1;margin-bottom:6px}
.menu-item-content{display:flex;align-items:center;gap:10px}
.menu-item-text{min-width:0}
.menu-item-text b{display:block}


.cat-character{
  position:absolute;right:62px;bottom:12px;width:120px;height:100px;display:none;z-index:7;
  transform-origin:50% 90%
}
.cat-character.show{display:block;animation:catIdle 1.8s ease-in-out infinite}
#catToyProp,#catFoodProp{position:absolute;z-index:10;display:none}
#catToyProp.show,#catFoodProp.show{display:block}
#catToyProp{right:65px;bottom:18px;width:90px;height:70px}
#catFoodProp{right:45px;bottom:5px;width:95px;height:65px}
@keyframes catIdle{50%{transform:translateY(-3px) rotate(1deg)}}
#dennis.cat-pet{animation:catPetScene 2.4s ease-in-out 1}
#dennis.cat-feed{animation:catFeedScene 2.3s ease-in-out 1}
#dennis.cat-play{animation:catPlayScene 2.7s ease-in-out 1}
@keyframes catPetScene{
  0%,100%{transform:translate(0,0) rotate(0)}
  20%{transform:translate(28px,18px) rotate(6deg)}
  45%{transform:translate(42px,30px) rotate(10deg)}
  70%{transform:translate(30px,18px) rotate(5deg)}
}
@keyframes catFeedScene{
  0%,100%{transform:translate(0,0)}
  30%{transform:translate(26px,10px) rotate(4deg)}
  60%{transform:translate(40px,16px) rotate(7deg)}
}
@keyframes catPlayScene{
  0%,100%{transform:translate(0,0) rotate(0)}
  18%{transform:translate(-15px,-8px) rotate(-5deg)}

  58%{transform:translate(-10px,-16px) rotate(-4deg)}

#dennis.sleep .body-main{animation:sleepBody 2.8s ease-in-out 1}
#dennis.sleep .head-main{animation:sleepHead 2.8s ease-in-out 1}
@keyframes sleepBody{
  0%{transform:translate(0,0) rotate(0) scaleX(.80) scaleY(1.08)}

}

  0%{transform:rotate(0) scale(.96)}
  45%,100%{transform:translate(-10px,14px) rotate(-12deg) scale(.96)}
}

@keyframes showerDetailed{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px) rotate(-2deg)}
  40%{transform:translateX(6px) rotate(2deg)}
  60%{transform:translateX(-4px) rotate(-1deg)}
  80%{transform:translateX(4px) rotate(1deg)}
}


#eventBox + #wishBox,
#wishBox + #catBox,
#catBox + #warningBox{margin-top:10px}
#warningBox + .autosave-note,
#warningBox + .stats{margin-top:14px}


/* Version 1.4.23 – komplett neu gezeichnete Figur und Einzelteilanimationen */
.stage{width:350px;height:360px}
#dennis{position:absolute;inset:0;transform-origin:50% 92%}
#dennis svg{overflow:visible}
.dennis-rig,.head,.torso,.arm,.leg{transform-box:fill-box;transform-origin:center}
.arm-left,.arm-right{transform-origin:50% 10%}
.leg-left,.leg-right{transform-origin:50% 10%}
.head{transform-origin:50% 90%}
.torso{transform-origin:50% 90%}

#dennis.idle .head{animation:headIdle 4s ease-in-out infinite}
#dennis.idle .torso{animation:torsoIdle 2.4s ease-in-out infinite}
#dennis.idle .arm-left{animation:armIdleL 3.6s ease-in-out infinite}
#dennis.idle .arm-right{animation:armIdleR 3.6s ease-in-out infinite}
@keyframes headIdle{0%,100%{transform:rotate(0)}35%{transform:rotate(-2deg)}70%{transform:rotate(1.5deg)}}
@keyframes torsoIdle{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.985) translateY(2px)}}
@keyframes armIdleL{0%,100%{transform:rotate(0)}50%{transform:rotate(2deg)}}

#dennis .mega-chest-plate,

#dennis.evolution-2 .mega-emblem{transform:scale(1.22)}
#dennis.evolution-1 .dernnis-visual,#dennis.evolution-2 .mega-visual{transform:none!important}




/* Onkel Dennis 1.4.23 – Spielfläche bleibt wie bei PugLife sichtbar */
#gameScreen .screen{
  position:-webkit-sticky!important;
  position:sticky!important;
  top:max(8px,env(safe-area-inset-top))!important;
  z-index:90!important;
  margin-bottom:14px!important;
  box-shadow:
    inset 0 0 0 4px #5f493f,
    0 7px 0 #a96547,
    0 14px 28px rgba(70,48,35,.24)!important;
  transform:translateZ(0);
  -webkit-backface-visibility:hidden;
  backface-visibility:hidden;
}

/* Alles unterhalb der Szene scrollt normal weiter */
.info,
.stats,
.tabs,
.pane,
.actions,
.foodgrid,
.drinkgrid,
.inventorygrid,
.shopgrid,
.outfitgrid,
.achievementgrid,
.wish,
.notice,
.meta,
.foot{
  position:relative;
  z-index:1;
}

/* Dialoge und Minispiele liegen über der haftenden Spielfläche */
.modal,
.overlay,
.minigame-modal,
.settings-modal,
#evolutionModal{
  z-index:2000!important;
}

/* Auf sehr kleinen Displays bleibt die Szene kompakter */

    top:max(4px,env(safe-area-inset-top))!important;

    min-height:280px!important;
  }
}

function migrate(s){
 const d=defaultState(s&&s.name,s&&s.cycle);
 const merged=Object.assign(d,s||{});
 if(typeof merged.evolutionStage!=="number")merged.evolutionStage=0;
 merged.evolutionStage=Math.max(0,Math.min(2,Math.floor(merged.evolutionStage)));
 if(!merged.inventory)merged.inventory={ice:1,cake:1,cola:1,juice:1,medicine:0};
 if(!merged.ownedOutfits)merged.ownedOutfits={none:true};
 if(!merged.outfit)merged.outfit="none";
 if(!merged.events)merged.events={nextDay:3,current:null,history:[]};
if(!merged.stats)merged.stats={games:0,wishes:0,events:0,sports:0,food:0,drinks:0};
 for(const k of ["games","wishes","events","sports","food","drinks"])if(typeof merged.stats[k]!=="number")merged.stats[k]=0;
 if(!merged.achievements)merged.achievements={};
 if(!merged.cat)merged.cat={visiting:false,mood:70,lastVisitDay:0,lastVisitTick:0};
 if(typeof merged.cat.lastVisitTick!=="number")merged.cat.lastVisitTick=0;
 if(!("wish" in merged))merged.wish=null;
 return merged
}

function currentEvent(){
 return state.events&&state.events.current&&state.events.current.day===state.day?state.events.current:null
}
function triggerEvent(day){
 if(!state.events)state.events={nextDay:3,current:null,history:[]};
 if(state.events.current&&state.events.current.day<day)state.events.current=null;
 if(day<state.events.nextDay)return;
 const pool=eventTypes.filter(e=>!state.events.history.slice(-2).includes(e.id));
 const ev=pool[Math.floor(Math.random()*pool.length)]||eventTypes[0];
 state.events.current={...ev,day};
 state.events.history.push(ev.id);
 state.events.nextDay=day+3+Math.floor(Math.random()*3);
 state.stats.events++;
 if(ev.id==="surprise"){
   state.coins+=12;
   state.inventory.cake=(state.inventory.cake||0)+1;
   toast("Überraschungstag: +12 Münzen und Kuchen")
 }
 toast("Event: "+ev.name);
 say(ev.text)
}

function ensureEvolution(){
 if(!state)return;
 if(typeof state.evolutionStage!=="number")state.evolutionStage=0;
 state.evolutionStage=Math.max(0,Math.min(2,Math.floor(state.evolutionStage)));
 state.name=["Dennis","Dernnis","Mega Derniz"][state.evolutionStage];
}
function evolutionName(stage){
 return ["Dennis","Dernnis","Mega Derniz"][stage]||"Dennis";
}
function evolutionCost(){
 return state.evolutionStage===0?100:state.evolutionStage===1?250:0;
}
function evolutionReady(){
 return ["hunger","thirst","mood","energy","hygiene","health","fitness"]
  .every(k=>Number(state[k])>=90);
}

function syncEvolutionOutfit(){
 if(!state)return;
 const d=$("dennis");
 if(!d)return;
 d.classList.remove("evolution-0","evolution-1","evolution-2");
 d.classList.add("evolution-"+state.evolutionStage);
  syncEvolutionOutfit();
}

function renderEvolution(){
 if(!state)return;
 ensureEvolution();
 const d=$("dennis");
 if(d){
  d.classList.remove("evolution-0","evolution-1","evolution-2");
  d.classList.add("evolution-"+state.evolutionStage);
 }
 $("nameLabel").textContent=state.name;
 const btn=$("evolveBtn");
 if(btn){
  const animationLocked=Date.now()<lockedUntil;
  if(state.evolutionStage>=2){
   btn.disabled=true;
   btn.innerHTML="<span>👑</span>Maximal entwickelt";
  }else{
   btn.disabled=animationLocked;
   btn.innerHTML="<span>✨</span>Entwickeln";
  }
 }
}
function openEvolution(){
 if(Date.now()<lockedUntil)return;
 ensureEvolution();
 const req=$("evolutionRequirements");
 const confirmBtn=$("evolutionConfirm");
 if(state.evolutionStage>=2){
  $("evolutionTitle").textContent="Mega Derniz";
  $("evolutionSymbol").textContent="👑";
  $("evolutionText").textContent="Mega Derniz hat bereits die höchste Entwicklungsstufe erreicht.";
  req.innerHTML="";
  confirmBtn.classList.add("hidden");
 }else{
  const next=evolutionName(state.evolutionStage+1);
  const cost=evolutionCost();
  $("evolutionTitle").textContent=state.name+" → "+next;
  $("evolutionSymbol").textContent=state.evolutionStage===0?"✨":"🌟";
  $("evolutionText").textContent="Alle Statuswerte müssen mindestens 90 betragen. Zusätzlich benötigst du die angezeigte Anzahl an Münzen.";
  confirmBtn.classList.remove("hidden");
  confirmBtn.textContent="Für "+cost+" Münzen entwickeln";
  const labels={hunger:"Hunger",thirst:"Durst",mood:"Laune",energy:"Energie",hygiene:"Hygiene",health:"Gesundheit",fitness:"Fitness"};
  req.innerHTML="";
  Object.entries(labels).forEach(([key,label])=>{
   const value=Math.round(Number(state[key])||0);
   const row=document.createElement("div");
   row.className="evolution-row "+(value>=90?"ok":"fail");
   row.innerHTML="<span>"+label+"</span><b>"+value+" / 90</b>";
   req.appendChild(row);
  });
  const coins=document.createElement("div");
  coins.className="evolution-row "+(state.coins>=cost?"ok":"fail");
  coins.innerHTML="<span>Münzen</span><b>"+state.coins+" / "+cost+"</b>";
  req.appendChild(coins);
  confirmBtn.disabled=!(evolutionReady()&&state.coins>=cost);
 }
 $("evolutionModal").classList.remove("hidden");
}
function closeEvolution(){
 $("evolutionModal").classList.add("hidden");
}
function performEvolution(){
 ensureEvolution();
 if(state.evolutionStage>=2)return;
 const cost=evolutionCost();
 if(!evolutionReady()||state.coins<cost){
  toast("Die Voraussetzungen sind noch nicht erfüllt.");
  return;
 }
 state.coins-=cost;
 state.evolutionStage++;
 state.name=evolutionName(state.evolutionStage);
 closeEvolution();
 const d=$("dennis");
 if(d){
  d.classList.remove("idle");
  d.classList.add("evolving");
 }
 const stage=document.querySelector(".stage");
 if(stage){
  const flash=document.createElement("div");
  flash.className="evolution-flash";
  flash.textContent=state.evolutionStage===1?"✨":"👑";
  stage.appendChild(flash);
  setTimeout(()=>flash.remove(),2100);
 }
 save();
 setTimeout(()=>{
  if(d){d.classList.remove("evolving");d.classList.add("idle")}
  render();
  toast(state.name+" wurde entwickelt!");
 },2100);
}




function render(){
 if(!state)return;
 ensureEvolution();
 ["hunger","thirst","mood","energy","hygiene","health","fitness"].forEach(k=>{
   state[k]=clamp(Number.isFinite(Number(state[k]))?Number(state[k]):75);
   $(k).style.width=state[k]+"%";$(k+"N").textContent=Math.round(state[k])
 });
 $("nameLabel").textContent=state.name;$("dayLabel").textContent=state.day;$("clockLabel").textContent=clockText();
 renderEvolution();
 $("coins").textContent=state.coins;$("level").textContent=state.level;$("xp").textContent=state.xp;
 renderRoom();renderFood();renderDrinks();renderInventory();renderShop();renderOutfits();applyOutfit();renderEventWish();updateAchievements();renderAchievements();renderWarnings();

}

 })
}
function renderDrinks(){
 $("drinkGrid").innerHTML="";
 Object.entries(drinks).forEach(([id,x])=>{
   const n=state.inventory[id]||0;
   const b=document.createElement("button");
   b.className="item";
   b.innerHTML="<div class='menu-item-content'><div class='item-icon'>"+iconFor(id)+"</div><div class='menu-item-text'><b>"+x.name+"</b><small>Im Inventar: "+n+"</small></div></div>";
   b.onclick=()=>consumeDrink(id);
   $("drinkGrid").appendChild(b)
 })
}

function renderInventory(){
 const box=$("inventoryGrid");box.innerHTML="";
 Object.entries(state.inventory).forEach(([id,n])=>{
   if(!n)return;
   const x=catalog[id];if(!x)return;
   const b=document.createElement("button");
   b.className="inventoryitem";
   b.innerHTML="<div class='menu-item-content'><div class='item-icon'>"+iconFor(id)+"</div><div class='menu-item-text'><b>"+x.name+"</b><small>Anzahl: "+n+"</small></div></div>";
   if(id==="medicine")b.onclick=()=>useMedicine();
   box.appendChild(b)
 })
}
function renderShop(){
 const box=$("shopGrid");box.innerHTML="";
 Object.entries(catalog).forEach(([id,x])=>{
   const b=document.createElement("button");
   b.className="shopitem";
   const owned=x.type==="outfit"&&state.ownedOutfits[id];
   const displayPrice=(currentEvent()&&currentEvent().id==="cake"&&id==="cake")?2:x.cost;
   b.innerHTML="<div class='menu-item-content'><div class='item-icon'>"+iconFor(id)+"</div><div class='menu-item-text'><b>"+x.name+"</b><small>"+(owned?"Bereits gekauft":displayPrice+" Münzen")+"</small></div></div>";
   b.onclick=()=>buy(id);
   box.appendChild(b)
 })
}
function renderOutfits(){
 const box=$("outfitGrid");box.innerHTML="";
 const list=[["none",{name:"Standard"}],...Object.entries(catalog).filter(([id,x])=>x.type==="outfit")];
 list.forEach(([id,x])=>{
   if(id!=="none"&&!state.ownedOutfits[id])return;
   const b=document.createElement("button");
   b.className="outfititem"+(state.outfit===id?" active":"");
   b.innerHTML="<div class='menu-item-content'><div class='item-icon'>"+(id==="none"?"🧍":iconFor(id))+"</div><div class='menu-item-text'><b>"+x.name+"</b><small>"+(state.outfit===id?"Angezogen":"Auswählen")+"</small></div></div>";
   b.onclick=()=>{state.outfit=id;save();render()};
   box.appendChild(b)
 })
}
function applyOutfit(){
 const d=$("dennis");
 d.classList.remove("wearing-cap","wearing-redshirt","wearing-greenshirt","wearing-lightjeans","wearing-blackpolo","wearing-bluecap");
 if(state.outfit&&state.outfit!=="none")d.classList.add("wearing-"+state.outfit)
}
function buy(id){
 const x=catalog[id];
 const price=(currentEvent()&&currentEvent().id==="cake"&&id==="cake")?2:x.cost;
 if(state.coins<price){toast("Nicht genug Münzen");say("Für "+x.name+" fehlen dir "+(price-state.coins)+" Münzen.");return}
 if(x.type==="outfit"&&state.ownedOutfits[id]){toast("Bereits gekauft");return}
 state.coins-=price;
 if(x.type==="outfit")state.ownedOutfits[id]=true;
 else state.inventory[id]=(state.inventory[id]||0)+1;
 save();render();toast(x.name+" gekauft")
}
function useMedicine(){
 if(!(state.inventory.medicine>0))return;
 if(state.health>=90){toast("Medizin wird gerade nicht benötigt");return}
 state.inventory.medicine--;
 state.health=clamp(state.health+35);
 say("Dennis fühlt sich besser.");
 save();render()
}

function lock(ms){
 lockedUntil=Date.now()+ms;
 document.querySelectorAll("#gameScreen button").forEach(b=>b.disabled=true);
 setTimeout(()=>{
   if(Date.now()>=lockedUntil){
     document.querySelectorAll("#gameScreen button").forEach(b=>b.disabled=false);
     renderEvolution();
   }
 },ms+30)
}
function animate(cls,ms){$("dennis").className=cls;setTimeout(()=>$("dennis").className="idle",ms)}
function consumeFood(id){
 if(Date.now()<lockedUntil)return;
 const x=foods[id];
 if(!(state.inventory[id]>0)){toast("Nicht im Inventar");return}
 lock(1900);state.inventory[id]--;state.stats.food++;state.hunger=clamp(state.hunger+x.effect);
 const moodBonus=currentEvent()&&currentEvent().id==="ice"&&id==="ice"?x.mood:x.mood;
 state.mood=clamp(state.mood+x.mood+moodBonus);state.health=clamp(state.health+x.health);
 const snackProp=$("snack");
 snackProp.textContent=iconFor(id);
 snackProp.setAttribute("aria-label",x.name);
 snackProp.classList.add("show","to-mouth");
 animate("eat",1900);
 say(state.name+" genießt "+x.name+".");
 setTimeout(()=>{
   snackProp.classList.remove("show","to-mouth");
   snackProp.textContent=""
 },1850);
 gainXp(4);fulfillWish("food",id);save();render()
}
function consumeDrink(id){
 if(Date.now()<lockedUntil)return;
 const x=drinks[id];
 if(!(state.inventory[id]>0)){toast("Nicht im Inventar");return}
 lock(1800);state.inventory[id]--;state.stats.drinks++;state.thirst=clamp(state.thirst+x.effect);state.mood=clamp(state.mood+x.mood);state.health=clamp(state.health+x.health);state.energy=clamp(state.energy+(x.energy||0));
 const drinkProp=$("drinkProp");
 drinkProp.textContent=iconFor(id);
 drinkProp.setAttribute("aria-label",x.name);
 drinkProp.classList.add("show","to-mouth");
 animate("drink",1800);
 say(state.name+" trinkt "+x.name+".");
 setTimeout(()=>{
   drinkProp.classList.remove("show","to-mouth");
   drinkProp.textContent=""
 },1750);
 gainXp(4);save();render()
}
function gainXp(n){state.xp+=n;if(state.xp>=100){state.xp-=100;state.level++;state.coins+=10;toast("Level "+state.level+" erreicht")}}

function switchToActivityRoom(room){
 const previous=state.room;
 state.room=room;
 renderRoom();
 return previous
}
function returnFromActivityRoom(previous,delay){
 setTimeout(()=>{
   state.room=previous;
   renderRoom();
   save()
 },delay)
}

function action(type){
 if(Date.now()<lockedUntil)return;
 const sportTypes=["exercise","boulder"];
 if(sportTypes.includes(type)){
   if(state.health<20){toast("Dennis ist dafür nicht fit genug");say("Er sollte sich erst erholen.");return}
   if(state.energy<15){toast("Zu wenig Energie");return}
   const map={
     exercise:{room:"garden",cls:"run",ms:2700,fit:14,text:"joggt durch den Garten"},
     boulder:{room:"boulder",cls:"boulder",ms:3000,fit:18,text:"klettert Schritt für Schritt die Wand hoch"}
   };
   const cfg=map[type],previous=switchToActivityRoom(cfg.room);
   lock(cfg.ms);
   state.energy=clamp(state.energy-15);
   const sportBonus=currentEvent()&&currentEvent().id==="sport"?2:1;
   state.fitness=clamp(state.fitness+cfg.fit*sportBonus);
   state.mood=clamp(state.mood+8);state.hunger=clamp(state.hunger-6);state.thirst=clamp(state.thirst-8);
   state.stats.sports++;
   animate(cfg.cls,cfg.ms);say(state.name+" "+cfg.text+".");
   returnFromActivityRoom(previous,cfg.ms);
   gainXp(9);fulfillWish("action",type);
   const earned=coinReward(4);toast("Sport-Belohnung: +"+earned+" Münzen")
 }else if(type==="sleep"){
   const previous=switchToActivityRoom("bedroom");
   lock(3400);
   state.energy=clamp(state.energy+40);state.health=clamp(state.health+5);state.hunger=clamp(state.hunger-8);
   $("sleepProp").classList.add("show");
   $("sleepZzz").classList.add("show");
   animate("sleep",3400);say(state.name+" legt sich hin, schließt die Augen und schläft tief und fest.");
   setTimeout(()=>{
     $("sleepProp").classList.remove("show");
     $("sleepZzz").classList.remove("show")
   },3350);
   returnFromActivityRoom(previous,3400);
   gainXp(4)
 }else if(type==="shower"){
   const previous=switchToActivityRoom("bathroom");
   lock(2800);
   state.hygiene=100;state.mood=clamp(state.mood+4);
   $("showerProp").classList.add("show");
   animate("shower",2800);say(state.name+" wäscht sich unter der Dusche gründlich die Haare.");
   setTimeout(()=>$("showerProp").classList.remove("show"),2750);
   returnFromActivityRoom(previous,2800);
   gainXp(4);fulfillWish("action","shower")
 }else if(type==="gaming"){
   const previous=switchToActivityRoom("living");
   lock(3400);
   state.mood=clamp(state.mood+24);state.energy=clamp(state.energy-6);state.fitness=clamp(state.fitness-2);
   $("gamingProp").classList.add("show");
   animate("gaming",3400);say(state.name+" setzt sich hin und spielt konzentriert ein Videospiel.");
   setTimeout(()=>$("gamingProp").classList.remove("show"),3350);
   returnFromActivityRoom(previous,3400);
   gainXp(7);fulfillWish("action","gaming")
 }else if(type==="relax"){
   const previous=switchToActivityRoom("living");
   lock(2000);
   state.mood=clamp(state.mood+(currentEvent()&&currentEvent().id==="movie"?40:22));state.energy=clamp(state.energy+8);
   animate("cheer",2000);say(state.name+" macht es sich für einen Filmabend gemütlich.");
   returnFromActivityRoom(previous,2000);
   gainXp(5);fulfillWish("action","relax")
 }else if(type==="catPet"){
   if(!state.cat.visiting){toast("Gerade ist keine Katze da");say("Vielleicht kommt später eine Katze vorbei.");return}
   const previous=switchToActivityRoom("garden");
   lock(2400);
   state.mood=clamp(state.mood+18);state.cat.mood=clamp(state.cat.mood+15);
   animate("cat-pet",2400);say(state.name+" kniet sich hin und streichelt die Katze.");
   returnFromActivityRoom(previous,2400);
   fulfillWish("action","catPet");gainXp(7);endCatVisitLater()
 }else if(type==="catFeed"){
   if(!state.cat.visiting){toast("Gerade ist keine Katze da");return}
   const foodId=(state.inventory.catfood>0)?"catfood":((state.inventory.cattreat>0)?"cattreat":null);
   if(!foodId){toast("Kein Katzenfutter im Inventar");say("Im Laden gibt es Katzenfutter und Leckerli.");return}
   const previous=switchToActivityRoom("garden");
   lock(2300);
   state.inventory[foodId]--;
   state.mood=clamp(state.mood+12);state.cat.mood=clamp(state.cat.mood+22);state.coins+=4;
   $("catFoodProp").classList.add("show");
   animate("cat-feed",2300);say(state.name+" stellt der Katze etwas zu fressen hin.");
   setTimeout(()=>$("catFoodProp").classList.remove("show"),2200);
   returnFromActivityRoom(previous,2300);
   fulfillWish("action","catFeed");gainXp(8);endCatVisitLater()
 }else if(type==="catPlay"){
   if(!state.cat.visiting){toast("Gerade ist keine Katze da");return}
   const toyId=(state.inventory.yarn>0)?"yarn":((state.inventory.feather>0)?"feather":null);
   if(!toyId){toast("Kein Katzenspielzeug im Inventar");say("Im Laden gibt es Wollknäuel und Federangeln.");return}
   const previous=switchToActivityRoom("garden");
   lock(2700);
   state.mood=clamp(state.mood+20);state.cat.mood=clamp(state.cat.mood+20);
   $("catToyProp").classList.add("show");
   animate("cat-play",2700);say(state.name+" spielt mit der Katze.");
   setTimeout(()=>$("catToyProp").classList.remove("show"),2600);
   returnFromActivityRoom(previous,2700);
   fulfillWish("action","catPlay");gainXp(9);endCatVisitLater()
 }else{
   lock(1800);state.mood=clamp(state.mood+15);animate("cheer",1800);say(state.name+" winkt fröhlich.");gainXp(3)
 }
 save();render()
}

function openGameModal(title,body){
 clearTimeout(gameTimer);
 $("gameContent").innerHTML="<h2>"+title+"</h2>"+body;
 $("gameModal").classList.remove("hidden")
}
function closeGameModal(){
 clearTimeout(gameTimer);
 $("gameModal").classList.add("hidden")
}
function memorySvg(id){
 if(id==="ice")return `<svg viewBox="0 0 100 100"><path d="M30 45 Q50 15 70 45Z" fill="#e98ca0"/><path d="M35 45 L50 88 L65 45Z" fill="#d3a66b"/><circle cx="50" cy="33" r="10" fill="#fff2c9"/></svg>`;
 if(id==="cake")return `<svg viewBox="0 0 100 100"><path d="M20 70 L50 25 L80 70Z" fill="#e5a080"/><path d="M25 62 H75" stroke="#fff0d0" stroke-width="8"/><circle cx="50" cy="25" r="7" fill="#d95d66"/></svg>`;
 if(id==="donut")return `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="32" fill="#e3a36f"/><circle cx="50" cy="50" r="13" fill="#fff7e8"/><path d="M25 40 Q50 22 75 40" fill="none" stroke="#e87f98" stroke-width="12"/></svg>`;
 return `<svg viewBox="0 0 100 100"><rect x="24" y="22" width="52" height="58" rx="8" fill="#72452f"/><path d="M38 22V80M58 22V80M24 42H76M24 61H76" stroke="#ad7754" stroke-width="4"/></svg>`
}
function startMemory(){
 const ids=["ice","cake","donut","chocolate"];
 const deck=[...ids,...ids].sort(()=>Math.random()-.5);
 let first=null,lockTurn=false,matches=0,turns=0;
 openGameModal("Süßigkeiten-Memory","<p>Finde alle vier Paare.</p><div id='memoryGrid' class='memory-grid'></div><div id='gameStatus'></div>");
 const grid=$("memoryGrid");
 deck.forEach((id,i)=>{
   const b=document.createElement("button");b.className="memory-card";b.dataset.id=id;
   b.innerHTML="<div class='memory-art'></div>";
   b.onclick=()=>{
     if(lockTurn||b.classList.contains("matched")||b.classList.contains("revealed"))return;
     b.classList.add("revealed");b.querySelector(".memory-art").innerHTML=memorySvg(id);
     if(!first){first=b;return}
     turns++;lockTurn=true;
     if(first.dataset.id===b.dataset.id){
       first.classList.add("matched");b.classList.add("matched");matches++;first=null;lockTurn=false;
       if(matches===4){
         const reward=Math.max(8,18-turns);
         state.coins+=reward;gainXp(12);state.stats.games++;save();render();
         $("gameStatus").textContent="Geschafft! +"+reward+" Münzen"
       }
     }else{
       setTimeout(()=>{first.classList.remove("revealed");b.classList.remove("revealed");first.querySelector(".memory-art").innerHTML="";b.querySelector(".memory-art").innerHTML="";first=null;lockTurn=false},700)
     }
   };
   grid.appendChild(b)
 })
}
function startJogGame(){
 let steps=0,time=5;
 openGameModal("Jogging-Challenge","<p>Tippe fünfmal schnell auf Dennis.</p><div class='challenge-area'><button id='runner' class='runner'></button><div class='obstacle'></div></div><div id='gameStatus'>Noch 5 Schritte</div>");
 const runner=$("runner"),status=$("gameStatus");
 runner.onclick=()=>{steps++;runner.style.left=(18+steps*42)+"px";runner.style.bottom=(steps%2?52:28)+"px";status.textContent="Noch "+Math.max(0,5-steps)+" Schritte";if(steps>=5){clearInterval(gameTimer);state.coins+=10;gainXp(10);state.stats.games++;save();render();status.textContent="Ziel erreicht! +10 Münzen"}};
 gameTimer=setInterval(()=>{time--;if(time<=0){clearInterval(gameTimer);if(steps<5)status.textContent="Zeit vorbei – versuche es noch einmal."}},1000)
}
function startBoulderGame(){
 const seq=Array.from({length:5},()=>Math.floor(Math.random()*9));
 let pos=0;
 openGameModal("Boulder-Challenge","<p>Tippe die markierten Griffe nacheinander.</p><div id='holdGrid' class='hold-grid'></div><div id='gameStatus'></div>");
 const grid=$("holdGrid"),status=$("gameStatus");
 for(let i=0;i<9;i++){const b=document.createElement("button");b.className="hold";b.textContent=i+1;b.onclick=()=>{if(i===seq[pos]){
   b.classList.remove("next-hold");
   b.classList.add("correct");
   pos++;
   show();if(pos===seq.length){state.coins+=12;gainXp(13);state.stats.games++;save();render();status.textContent="Oben angekommen! +12 Münzen"}}else{pos=0;grid.querySelectorAll(".hold").forEach(x=>x.classList.remove("correct"));status.textContent="Falscher Griff – von vorn.";
   show()
 }};grid.appendChild(b)}
 function show(){
   grid.querySelectorAll(".hold").forEach(x=>{
     x.style.outline="";
     x.classList.remove("next-hold")
   });
   if(pos<seq.length){
     grid.children[seq[pos]].classList.add("next-hold");
     status.textContent="Tippe jetzt Griff "+(seq[pos]+1)+" · Schritt "+(pos+1)+" von 5"
   }
 }
 show()
}
function startCatchGame(){
 let score=0,round=0;
 openGameModal("Getränke fangen","<p>Fange Cola, Saft oder Kakao. Vermeide die leere Dose.</p><div id='catchGrid' class='catch-grid'></div><div id='gameStatus'>0 Punkte</div>");
 const grid=$("catchGrid"),status=$("gameStatus");
 function next(){
   grid.innerHTML="";round++;
   const options=["cola","juice","cocoa","empty","cola","empty"].sort(()=>Math.random()-.5).slice(0,3);
   options.forEach(id=>{const b=document.createElement("button");b.className="catch-item";b.textContent=id==="empty"?"Leere Dose":catalog[id].name;b.onclick=()=>{if(id==="empty"){score=Math.max(0,score-1)}else score++;status.textContent=score+" Punkte";if(round>=6){const reward=score*2;state.coins+=reward;gainXp(8);state.stats.games++;save();render();grid.innerHTML="";status.textContent="Fertig! +"+reward+" Münzen"}else next()};grid.appendChild(b)})
 }
 next()
}
function startMinigame(type){
 if(type==="memory")startMemory();
 else if(type==="jog")startJogGame();
 else if(type==="boulder")startBoulderGame();
 else startCatchGame()
}

function advance(seconds){
 const daySeconds=state.cycle*60,gm=seconds/daySeconds*1440,frac=gm/1440;
 state.gameMinutes+=gm;
 while(state.gameMinutes>=1440){
   state.gameMinutes-=1440;state.day++;
   triggerEvent(state.day);
   maybeCreateWish()
 }
 state.hunger-=52*frac;state.thirst-=65*frac;state.mood-=26*frac;state.energy-=40*frac;state.hygiene-=34*frac;state.fitness-=22*frac;
 let danger=0;
 if(state.hunger<15)danger++;
 if(state.thirst<15)danger+=2;
 if(state.hygiene<15)danger++;
 if(state.energy<10)danger++;
 if(danger)state.health-=18*frac*danger;
 else if(state.hunger>45&&state.thirst>45&&state.hygiene>45)state.health+=3*frac;
}
function tick(){if(!state)return;advance(5);maybeCreateWish();maybeCatVisit();save();render()}
function startLoop(){
 clearInterval(timer);
 clearInterval(autosaveTimer);
 timer=setInterval(tick,5000);
 autosaveTimer=setInterval(()=>{if(state)save()},5000)
}
function openGame(){
 state=migrate(load());if(!state)return;
 $("startScreen").classList.add("hidden");$("gameScreen").classList.remove("hidden");
 if(state.day>=state.events.nextDay)triggerEvent(state.day);
 maybeCreateWish();maybeCatVisit();render();say("Hallo, ich bin "+state.name+".");startLoop()
}
function updateStart(){
 const exists=!!load();$("continueBox").classList.toggle("hidden",!exists);$("createBox").classList.toggle("hidden",exists)
}

$("evolveBtn").onclick=openEvolution;
$("evolutionCancel").onclick=closeEvolution;
$("evolutionConfirm").onclick=performEvolution;

document.querySelectorAll("[data-action]").forEach(b=>b.onclick=()=>action(b.dataset.action));
document.querySelectorAll("[data-game]").forEach(b=>b.onclick=()=>startMinigame(b.dataset.game));
document.querySelectorAll(".roombtn").forEach(b=>b.onclick=()=>{state.room=b.dataset.room;save();renderRoom()});
$("tabs").onclick=e=>{const b=e.target.closest(".tab");if(!b)return;document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));b.classList.add("active");document.querySelectorAll(".action-pane").forEach(x=>x.classList.remove("active"));$("pane-"+b.dataset.tab).classList.add("active")};
$("createBtn").onclick=()=>{state=defaultState($("playerName").value.trim(),$("cycle").value);save();openGame()};
$("continueBtn").onclick=openGame;
$("deleteBtn").onclick=()=>{if(confirm("Spielstand wirklich löschen?")){removeSave();updateStart()}};
$("menuBtn").onclick=()=>{closeGameModal();save();clearInterval(timer);clearInterval(autosaveTimer);$("gameScreen").classList.add("hidden");$("startScreen").classList.remove("hidden");updateStart()};
$("gameClose").onclick=closeGameModal;

$("settingsBtn").onclick=()=>{$("settingsCycle").value=state.cycle;$("settingsModal").classList.remove("hidden")};
$("closeSettings").onclick=()=>$("settingsModal").classList.add("hidden");
$("saveSettings").onclick=()=>{state.cycle=Number($("settingsCycle").value);save();$("settingsModal").classList.add("hidden");toast("Gespeichert")};
$("resetBtn").onclick=()=>{if(confirm("Spielstand vollständig löschen?")){removeSave();clearInterval(timer);clearInterval(autosaveTimer);state=null;$("settingsModal").classList.add("hidden");$("gameScreen").classList.add("hidden");$("startScreen").classList.remove("hidden");updateStart()}};
window.addEventListener("pagehide",save);
document.addEventListener("visibilitychange",()=>{if(document.hidden)save();else if(state){const now=Date.now(),delta=Math.max(0,(now-state.last)/1000);advance(Math.min(delta,43200));save();render();startLoop()}});
updateStart()



})();
</script>
</div></body>
